# 放到服务器 /etc/nginx/conf.d/
# 确保中继已在本机运行：PORT=3000 node relay 或 pm2
# 首次启用 HTTPS：在服务器执行 certbot certonly --webroot -d lark.nicole.xin -w /www/wwwroot/lark

# HTTP：仅用于跳转 HTTPS 及 Let's Encrypt 校验
server {
    listen 80;
    server_name lark.nicole.xin;

    location ^~ /.well-known/acme-challenge/ {
        root /www/wwwroot/lark;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl;
    server_name lark.nicole.xin;

    ssl_certificate     /etc/letsencrypt/live/lark.nicole.xin/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lark.nicole.xin/privkey.pem;

    # 前端静态文件（子路径 /xhsleadsdownload）
    location /xhsleadsdownload {
        return 301 /xhsleadsdownload/;
    }
    location /xhsleadsdownload/ {
        alias /www/wwwroot/lark/;
        index index.html;
        try_files $uri $uri/ /xhsleadsdownload/index.html;
    }

    # 中继 API 与 Webhook
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /webhook/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# 临时：仅 80，用于 certbot 申请证书（申请后替换为 nginx-lark.example.conf）
server {
    listen 80;
    server_name lark.nicole.xin;

    location ^~ /.well-known/acme-challenge/ {
        root /www/wwwroot/lark;
    }
    location /xhsleadsdownload {
        return 301 /xhsleadsdownload/;
    }
    location /xhsleadsdownload/ {
        alias /www/wwwroot/lark/;
        index index.html;
        try_files $uri $uri/ /xhsleadsdownload/index.html;
    }
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /webhook/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
